  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100vw; height:100vh; overflow:hidden;
    font-family: 'Georgia', serif;
    background: #111;
    user-select: none;
     overscroll-behavior: none;
  }

#bg {
  position: fixed;
  inset: 0;
  background-image: url('Ontwerp zonder titel (3).png');
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
will-change: transform;
  will-change: transform;
  transform: translate3d(0,0,0) scale(1.06);
}

  /* ── Muziekknop Styling (Strak grijs, langwerpig voor tekst) ── */
  #muteBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    
    /* Vorm aangepast naar een capsule/pill vorm voor tekst */
    padding: 8px 16px;
    border-radius: 20px;
    
    /* Grijze glassmorphism look */
    background: rgba(150, 150, 150, 0.15);
    border: 1px solid rgba(150, 150, 150, 0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* Tekst styling in strak grijs */
    color: #aaaaaa; 
    font-family: 'Georgia', serif;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    
    /* Voorkomt de oranje gloed op mobiele telefoons */
    -webkit-tap-highlight-color: transparent;
    outline: none;
    
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }
  #muteBtn:hover, #muteBtn:active {
    background: rgba(150, 150, 150, 0.3);
    border-color: rgba(150, 150, 150, 0.5);
    color: #ffffff; /* Tekst licht wit op bij aanraken */
    transform: scale(1.03);
  }

  /* ── Hearts ── */
  #hearts { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:5; }

  .heart {
    position:absolute; bottom:-60px;
    animation: floatUp linear forwards;
    opacity:0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0)       scale(.6) rotate(-10deg); opacity:0; }
    8%   { opacity:1; }
    50%  { transform: translateY(-50vh)   scale(1)  rotate(8deg); }
    90%  { opacity:.7; }
    100% { transform: translateY(-115vh)  scale(1.1) rotate(-5deg); opacity:0; }
  }

  /* ── Counter ── */
  #counter {
    position:fixed; bottom:90px; left:0; right:0;
    text-align:center; color:#fff; z-index:10;
    padding: 0 20px;
  }

  #counter-label {
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(255,255,255,.6); margin-bottom:10px;
  }

  .units { display:flex; justify-content:center; gap:18px; }

  .unit { text-align:center; }
  .unit-num {
    font-size:38px; font-weight:700; line-height:1;
    text-shadow: 0 2px 12px rgba(0,0,0,.6);
  }
  .unit-lbl {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,.5); margin-top:3px;
  }

  /* ── Setup bar ── */
  #setup {
    position:fixed; bottom:20px; left:0; right:0;
    display:flex; justify-content:center; gap:12px; z-index:20;
  }

  .file-btn {
    padding:9px 18px; border-radius:22px;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.3);
    color:#fff; font-size:12px; cursor:pointer;
    backdrop-filter:blur(12px);
    transition: background .2s;
    display:flex; align-items:center; gap:6px;
  }
  .file-btn:hover { background:rgba(255,255,255,.28); }
  .file-btn.done { background:rgba(255,150,180,.3); border-color:rgba(255,150,180,.5); }

#intro {
  pointer-events: none;
  transition: opacity 1.8s ease;
}

<div id="bg"></div>

<div id="hearts"></div>

<button id="muteBtn" onclick="toggleMute()">PLAY</button>

    <div class="unit"><div class="unit-num" id="m">0</div><div class="unit-lbl">minutes</div></div>

  </div>

<script>
window.addEventListener("DOMContentLoaded", () => {
  const intro = document.getElementById("intro");

  if (!intro) return;

  intro.style.opacity = "1";

  setTimeout(() => {
    intro.style.opacity = "0";
  }, 2500);

  setTimeout(() => {
    intro.remove();
  }, 4200);
});
 
  const START = new Date('2026-06-06T00:00:00');
  const EMOJIS = ['❤️','🩷','💕','💗','💖','🤍','💓'];

  // ── Counter ──
  function tick() {
    const diff = Date.now() - START.getTime();
    const abs  = Math.abs(diff);
    const sign = diff < 0;

    document.getElementById('counter-label').textContent =
      sign ? '✨ Starting in' : '❤️';

    document.getElementById('d').textContent = Math.floor(abs / 86400000);
    document.getElementById('h').textContent = Math.floor((abs % 86400000) / 3600000);
    document.getElementById('m').textContent = Math.floor((abs % 3600000)  / 60000);
    document.getElementById('s').textContent = Math.floor((abs % 60000)    / 1000);
  }
  setInterval(tick, 1000);
  tick();

  // ── Hearts ──
  function spawnHeart() {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = EMOJIS[Math.random() * EMOJIS.length | 0];
    const size = 14 + Math.random() * 22;
    const dur  = 5  + Math.random() * 7;
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      font-size: ${size}px;
      animation-duration: ${dur}s;
      animation-delay: ${Math.random() * 1.5}s;
    `;
    document.getElementById('hearts').appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }
  setInterval(spawnHeart, 3000);
  for (let i = 0; i < 5; i++) spawnHeart(); // burst on load

  // ── Image Setup ──
  let imgBase64 = null, imgMime = null;

  function setImage(inp) {
    if (!inp.files[0]) return;
    const file = inp.files[0];
    imgMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
      imgBase64 = e.target.result;
      document.getElementById('bg').style.backgroundImage = `url(${imgBase64})`;
      document.getElementById('imgLabel').classList.add('done');
      document.getElementById('imgLabel').textContent = '✅ Photo set';
      checkDownloadBtn();
    };
    reader.readAsDataURL(file);
  }

  // ── Audio Setup ──
  const audio = document.getElementById('audio');
  let muted = false, audioBase64 = null, audioMime = null;

  function setSong(inp) {
    if (!inp.files[0]) return;
    const file = inp.files[0];
    audioMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
      audioBase64 = e.target.result;
      audio.src = audioBase64;
      audio.play().then(() => {
        document.getElementById('muteBtn').textContent = 'PAUSE';
      }).catch(() => {});
      document.getElementById('songLabel').classList.add('done');
      document.getElementById('songLabel').textContent = '✅ Song set';
      checkDownloadBtn();
    };
    reader.readAsDataURL(file);
  }

  function checkDownloadBtn() {
    if (imgBase64 || audioBase64)
      document.getElementById('dlBtn').style.display = 'flex';
  }

    const audioTag = audioBase64

      : `<audio id="audio" src="Michael Bublé - Everything [Official Music Video].mp3" loop></audio>`;

 function burstHearts(amount = 4) {

  currentX += (targetX - currentX) * 0.08;
  currentY += (targetY - currentY) * 0.08;

  bg.style.transform =
    `translate3d(${currentX}px, ${currentY}px, 0) scale(1.06)`;

  requestAnimationFrame(animateBG);
