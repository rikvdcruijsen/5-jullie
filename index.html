<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>06.06.2026</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100vw; height:100vh; overflow:hidden;
    font-family: 'Georgia', serif;
    background: #111;
    user-select: none;
  }

  #bg {
    position:fixed;
    inset:0;
    background-image:url('Ontwerp zonder titel (3).png');
    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
    transition: opacity 1s ease;
  }

  #gradient {
    position:fixed; inset:0;
    display: none; /* Verlooplaag is nu verborgen */
    background: linear-gradient(
      to bottom,
      rgba(60,60,60,0.05) 0%,
      rgba(60,60,60,0.2) 40%,
      rgba(30,30,30,0.75) 70%,
      rgba(15,15,15,0.95) 100%
    );
  }

  /* ── Muziekknop Styling ── */
  #muteBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }
  #muteBtn:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.05);
  }
  #muteBtn:active {
    transform: scale(0.95);
  }

  /* ── Hearts ── */
  #hearts { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:5; }

  .heart {
    position:absolute; bottom:-60px;
    animation: floatUp linear forwards;
    opacity:0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0)       scale(.6) rotate(-10deg); opacity:0; }
    8%   { opacity:1; }
    50%  { transform: translateY(-50vh)   scale(1)  rotate(8deg); }
    90%  { opacity:.7; }
    100% { transform: translateY(-115vh)  scale(1.1) rotate(-5deg); opacity:0; }
  }

  /* ── Counter ── */
  #counter {
    position:fixed; bottom:90px; left:0; right:0;
    text-align:center; color:#fff; z-index:10;
    padding: 0 20px;
  }

  #counter-label {
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(255,255,255,.6); margin-bottom:10px;
  }

  .units { display:flex; justify-content:center; gap:18px; }

  .unit { text-align:center; }
  .unit-num {
    font-size:38px; font-weight:700; line-height:1;
    text-shadow: 0 2px 12px rgba(0,0,0,.6);
  }
  .unit-lbl {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,.5); margin-top:3px;
  }

  /* ── Setup bar ── */
  #setup {
    position:fixed; bottom:20px; left:0; right:0;
    display:flex; justify-content:center; gap:12px; z-index:20;
  }

  .file-btn {
    padding:9px 18px; border-radius:22px;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.3);
    color:#fff; font-size:12px; cursor:pointer;
    backdrop-filter:blur(12px);
    transition: background .2s;
    display:flex; align-items:center; gap:6px;
  }
  .file-btn:hover { background:rgba(255,255,255,.28); }
  .file-btn.done { background:rgba(255,150,180,.3); border-color:rgba(255,150,180,.5); }
</style>
</head>
<body>

<div id="bg"></div>
<div id="gradient"></div>
<div id="hearts"></div>

<button id="muteBtn" onclick="toggleMute()">🔇</button>

<div id="counter">
  <div id="counter-label">Together since</div>
  <div class="units">
    <div class="unit"><div class="unit-num" id="d">0</div><div class="unit-lbl">days</div></div>
    <div class="unit"><div class="unit-num" id="h">0</div><div class="unit-lbl">hours</div></div>
    <div class="unit"><div class="unit-num" id="m">0</div><div class="unit-lbl">minutes</div></div>
    <div class="unit"><div class="unit-num" id="s">0</div><div class="unit-lbl">seconds</div></div>
  </div>
</div>

<audio id="audio" src="Michael Bublé - Everything [Official Music Video].mp3" loop></audio>

<script>
  const START = new Date('2026-06-06T00:00:00');
  const EMOJIS = ['❤️','🩷','💕','💗','💖','🤍','💓'];

  // ── Counter ──
  function tick() {
    const diff = Date.now() - START.getTime();
    const abs  = Math.abs(diff);
    const sign = diff < 0;

    document.getElementById('counter-label').textContent =
      sign ? '✨ Starting in' : '❤️';

    document.getElementById('d').textContent = Math.floor(abs / 86400000);
    document.getElementById('h').textContent = Math.floor((abs % 86400000) / 3600000);
    document.getElementById('m').textContent = Math.floor((abs % 3600000)  / 60000);
    document.getElementById('s').textContent = Math.floor((abs % 60000)    / 1000);
  }
  setInterval(tick, 1000);
  tick();

  // ── Hearts ──
  function spawnHeart() {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = EMOJIS[Math.random() * EMOJIS.length | 0];
    const size = 14 + Math.random() * 22;
    const dur  = 5  + Math.random() * 7;
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      font-size: ${size}px;
      animation-duration: ${dur}s;
      animation-delay: ${Math.random() * 1.5}s;
    `;
    document.getElementById('hearts').appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }
  setInterval(spawnHeart, 3000);
  for (let i = 0; i < 5; i++) spawnHeart(); // burst on load

  // ── Interactieve Audio Functie (Play/Pauze) ──
  function toggleMute() {
    const audio = document.getElementById('audio');
    const muteBtn = document.getElementById('muteBtn');
    
    if (audio.paused) {
      audio.play().catch(err => console.log("Afspelen geblokkeerd:", err));
      muteBtn.textContent = '🔊';
    } else {
      audio.pause();
      muteBtn.textContent = '🔇';
    }
  }

  // ── Image Setup (Leest geüploade foto) ──
  let imgBase64 = null, imgMime = null;

  function setImage(inp) {
    if (!inp.files[0]) return;
    const file = inp.files[0];
    imgMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
      imgBase64 = e.target.result;
      document.getElementById('bg').style.backgroundImage = `url(${imgBase64})`;
      document.getElementById('imgLabel').classList.add('done');
      document.getElementById('imgLabel').textContent = '✅ Photo set';
      checkDownloadBtn();
    };
    reader.readAsDataURL(file);
  }

  // ── Audio Setup (Leest geüpload muziekbestand) ──
  const audio = document.getElementById('audio');
  let muted = false, audioBase64 = null, audioMime = null;

  function setSong(inp) {
    if (!inp.files[0]) return;
    const file = inp.files[0];
    audioMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
      audioBase64 = e.target.result;
      audio.src = audioBase64;
      audio.play().then(() => {
        document.getElementById('muteBtn').textContent = '🔊';
      }).catch(() => {});
      document.getElementById('songLabel').classList.add('done');
      document.getElementById('songLabel').textContent = '✅ Song set';
      checkDownloadBtn();
    };
    reader.readAsDataURL(file);
  }

  function checkDownloadBtn() {
    if (imgBase64 || audioBase64)
      document.getElementById('dlBtn').style.display = 'flex';
  }

  // ── Download de uiteindelijke NFC-pagina (Zonder setup-knoppen en mét juiste code) ──
  function downloadPage() {

    const audioTag = audioBase64
      ? `<audio id="audio" src="${audioBase64}" loop autoplay></audio>`
      : `<audio id="audio" src="Michael Bublé - Everything [Official Music Video].mp3" loop></audio>`;
