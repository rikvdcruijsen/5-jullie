<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>06.06.2026</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100vw; height:100vh; overflow:hidden;
    font-family: 'Georgia', serif;
    background: #111;
    user-select: none;
    overscroll-behavior: none;
  }

  #bg {
    position: fixed;
    inset: 0;
    background-image: url('Ontwerp zonder titel (3).png');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    will-change: transform;
    transform: translate3d(0,0,0) scale(1.06);
  }

  /* ── Muziekknop Styling ── */
  #muteBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    padding: 8px 16px;
    border-radius: 20px;
    background: rgba(150, 150, 150, 0.15);
    border: 1px solid rgba(150, 150, 150, 0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaaaaa;
    font-family: 'Georgia', serif;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    -webkit-tap-highlight-color: transparent;
    outline: none;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }
  #muteBtn:hover, #muteBtn:active {
    background: rgba(150, 150, 150, 0.3);
    border-color: rgba(150, 150, 150, 0.5);
    color: #ffffff;
    transform: scale(1.03);
  }

  /* ── Hearts ── */
  #hearts { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:5; }

  .heart {
    position:absolute; bottom:-60px;
    animation: floatUp linear forwards;
    opacity:0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0)       scale(.6) rotate(-10deg); opacity:0; }
    8%   { opacity:1; }
    50%  { transform: translateY(-50vh)   scale(1)  rotate(8deg); }
    90%  { opacity:.7; }
    100% { transform: translateY(-115vh)  scale(1.1) rotate(-5deg); opacity:0; }
  }

  /* ── Counter ── */
  #counter {
    position:fixed; bottom:90px; left:0; right:0;
    text-align:center; color:#fff; z-index:10;
    padding: 0 20px;
  }

  #counter-label {
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(255,255,255,.6); margin-bottom:10px;
  }

  .units { display:flex; justify-content:center; gap:18px; }

  .unit { text-align:center; }
  .unit-num {
    font-size:38px; font-weight:700; line-height:1;
    text-shadow: 0 2px 12px rgba(0,0,0,.6);
  }
  .unit-lbl {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,.5); margin-top:3px;
  }

  /* ── Cinematic intro ── */
  #intro {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 999;
    color: #fff;
    transition: opacity 1.8s ease;
    opacity: 1;
    pointer-events: none;
  }
  #intro h1 {
    font-size: 28px;
    letter-spacing: 6px;
    opacity: 0;
    animation: fadeInTitle 2.5s ease forwards 1s;
  }
  @keyframes fadeInTitle {
    to { opacity: 1; transform: scale(1.05); }
  }
</style>
</head>
<body>

<div id="intro"><h1>06.06.2026</h1></div>

<div id="bg"></div>
<div id="hearts"></div>

<button id="muteBtn" onclick="toggleMute()">PLAY</button>

<div id="counter">
  <div id="counter-label">Together since</div>
  <div class="units">
    <div class="unit"><div class="unit-num" id="d">0</div><div class="unit-lbl">days</div></div>
    <div class="unit"><div class="unit-num" id="h">0</div><div class="unit-lbl">hours</div></div>
    <div class="unit"><div class="unit-num" id="m">0</div><div class="unit-lbl">minutes</div></div>
    <div class="unit"><div class="unit-num" id="s">0</div><div class="unit-lbl">seconds</div></div>
  </div>
</div>

<audio id="audio" src="Michael Bublé - Everything [Official Music Video].mp3" loop></audio>

<script>
  const audio = document.getElementById('audio');
  const bg = document.getElementById('bg');

  // ── Mute/play toggle ──
  function toggleMute() {
    const muteBtn = document.getElementById('muteBtn');
    if (audio.paused) {
      audio.play().then(() => muteBtn.textContent = 'PAUSE').catch(() => {});
    } else {
      audio.pause();
      muteBtn.textContent = 'PLAY';
    }
  }

  // ── Intro fade ──
  window.addEventListener("DOMContentLoaded", () => {
    const intro = document.getElementById("intro");
    if (!intro) return;

    setTimeout(() => { intro.style.opacity = "0"; }, 2500);
    setTimeout(() => { intro.remove(); }, 4200);
  });

  // ── Countdown ──
  const START = new Date('2026-06-06T00:00:00');

  function tick() {
    const diff = Date.now() - START.getTime();
    const abs  = Math.abs(diff);
    const sign = diff < 0;

    document.getElementById('counter-label').textContent =
      sign ? '✨ Starting in' : '❤️';

    document.getElementById('d').textContent = Math.floor(abs / 86400000);
    document.getElementById('h').textContent = Math.floor((abs % 86400000) / 3600000);
    document.getElementById('m').textContent = Math.floor((abs % 3600000)  / 60000);
    document.getElementById('s').textContent = Math.floor((abs % 60000)    / 1000);
  }
  setInterval(tick, 1000);
  tick();

  // ── Floating hearts ──
  const EMOJIS = ['❤️','🩷','💕','💗','💖','🤍','💓'];

  function spawnHeart() {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = EMOJIS[Math.random() * EMOJIS.length | 0];
    const size = 14 + Math.random() * 22;
    const dur  = 5  + Math.random() * 7;
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      font-size: ${size}px;
      animation-duration: ${dur}s;
      animation-delay: ${Math.random() * 1.5}s;
    `;
    document.getElementById('hearts').appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }
  setInterval(spawnHeart, 3000);
  for (let i = 0; i < 5; i++) spawnHeart(); // burst on load

  function burstHearts(amount = 4) {
    for (let i = 0; i < amount; i++) spawnHeart();
  }

  // ── First-touch: start audio + burst hearts ──
  document.addEventListener('pointerdown', () => {
    if (audio.src && audio.paused) {
      audio.play().then(() => {
        document.getElementById('muteBtn').textContent = 'PAUSE';
      }).catch(() => {});
    }
  }, { once: true });

  document.addEventListener('pointerdown', () => {
    burstHearts(5);
  }, { passive: true });

  // ── Parallax background ──
  let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

  function animateBG() {
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;
    bg.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) scale(1.06)`;
    requestAnimationFrame(animateBG);
  }
  animateBG();

  document.addEventListener("mousemove", (e) => {
    targetX = (e.clientX / window.innerWidth - 0.5) * 10;
    targetY = (e.clientY / window.innerHeight - 0.5) * 10;
  });

  window.addEventListener("deviceorientation", (e) => {
    if (!e.gamma || !e.beta) return;
    targetX = e.gamma / 3;
    targetY = e.beta / 3;
  });
</script>
</body>
</html>
